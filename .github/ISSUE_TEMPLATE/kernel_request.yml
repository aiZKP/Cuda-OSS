name: Kernel request
description: Propose a new kernel for CCO to bundle and optimize.
title: "[kernel-request] "
labels: ["type:kernel-request", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Kernel choice is a strategy-level decision — open an issue first so we can discuss whether this kernel is the right next addition before any code is written.

        See [`maintainer/03-pr-types.md § Type 1`](../blob/main/maintainer/03-pr-types.md) for the full acceptance criteria once we agree the kernel should land. Surprise kernel PRs (no prior `type:kernel-request` issue) are declined.

  - type: input
    id: kernel-name
    attributes:
      label: Kernel name
      description: Short, lowercase, underscored. This is what will appear as `KERNEL_TYPE`.
      placeholder: layer_norm
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What does it compute?
      description: One paragraph. A reference PyTorch function (`torch.nn.functional.X` or a short snippet) is the cleanest answer.
    validations:
      required: true

  - type: textarea
    id: where
    attributes:
      label: Where is it used?
      description: Which model family, which layer, which paper if relevant. Helps establish why the project should care.
    validations:
      required: true

  - type: textarea
    id: why-now
    attributes:
      label: Why is this the right next kernel?
      description: How does it expand coverage vs. the five bundled kernels (`rms_norm`, `qkv_part_rope`, `swiglu_input_quant`, `persistent_matmul`, `dsa_forward`)? What bottleneck pattern would it exercise?
    validations:
      required: true

  - type: textarea
    id: existing-coverage
    attributes:
      label: Relevant existing KB entries (optional)
      description: What in [`CUDA_OPTIMIZATION.md § Cross-Kernel Optimization Patterns`](../blob/main/CUDA_OPTIMIZATION.md) would already apply to this kernel?

  - type: textarea
    id: typical-shapes
    attributes:
      label: Typical shapes (optional)
      description: Representative shapes that would appear in `kernel_configs/<name>.toml` — production sizes, dtypes, anything load-bearing.
